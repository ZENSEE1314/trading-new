    function destroyPanel(idx) {
      var p = chartPanels[idx];
      p.subCharts.forEach(function(sc) { if (sc.chart) sc.chart.remove(); if (sc.container) sc.container.remove(); });
      if (p.chart) p.chart.remove();
      var statsEl = document.getElementById('smc-stats-' + idx);
      if (statsEl) statsEl.remove();
      p.chart = null; p.candleSeries = null; p.volumeSeries = null;
      p.overlaySeries = []; p.subCharts = []; p.candles = [];
    }

    async function createChart(idx) {
      destroyPanel(idx);

      var container = document.getElementById('chart-main-' + idx);
      if (!container) return;
      container.innerHTML = '';

      // Show loading overlay
      var loadingEl = document.createElement('div');
      loadingEl.className = 'chart-loading-overlay';
      loadingEl.textContent = 'Loading...';
      container.appendChild(loadingEl);

      var chart = LightweightCharts.createChart(container, Object.assign({}, CHART_THEME, {
        width: container.clientWidth,
        height: container.clientHeight,
      }));

      var candleSeries = chart.addCandlestickSeries(CANDLE_OPTIONS);
      var p = chartPanels[idx];
      p.chart = chart;
      p.candleSeries = candleSeries;

      // Fetch data
      var binanceInterval = TV_TO_BINANCE[chartIntervals[idx]] || '1m';
      try {
        var candles = await fetchKlines(STATE.symbol, binanceInterval);
        p.candles = candles;

        // Auto-detect price precision for small-cap tokens (e.g. PEPE at $0.003)
        if (candles.length > 0) {
          var samplePrice = candles[candles.length - 1].close;
          var minMove = samplePrice >= 1000 ? 0.01
            : samplePrice >= 1 ? 0.0001
            : samplePrice >= 0.01 ? 0.000001
            : samplePrice >= 0.0001 ? 0.00000001
            : 0.0000000001;
          var precision = samplePrice >= 1000 ? 2
            : samplePrice >= 1 ? 4
            : samplePrice >= 0.01 ? 6
            : samplePrice >= 0.0001 ? 8
            : 10;
          candleSeries.applyOptions({ priceFormat: { type: 'price', precision: precision, minMove: minMove } });
        }

        candleSeries.setData(candles);
        // Default zoom: 1m shows 50 candles (wider bars), others show 100
        var totalBars = candles.length;
        var visibleBars = binanceInterval === '1m' ? 50 : 100;
        if (totalBars > visibleBars) {
          chart.timeScale().setVisibleLogicalRange({ from: totalBars - visibleBars, to: totalBars });
        } else {
          chart.timeScale().fitContent();
        }

        // Apply indicators
        applyIndicators(idx);
        // Hide loading overlay
        if (loadingEl.parentNode) loadingEl.remove();
      } catch (err) {
        console.error('Failed to load candles for panel ' + idx + ':', err);
        loadingEl.textContent = 'Failed to load';
        setTimeout(function() { if (loadingEl.parentNode) loadingEl.remove(); }, 2000);
      }

      // Resize observer
      var ro = new ResizeObserver(function() {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
      });
      ro.observe(container);
      p._resizeObserver = ro;
    }

    function applyIndicators(idx) {
      var p = chartPanels[idx];
      if (!p.chart || !p.candles.length) return;

      // Clear ALL existing overlays, sub-charts, and markers
      p.overlaySeries.forEach(function(s) { try { p.chart.removeSeries(s); } catch(_) {} });
      p.overlaySeries = [];
      p.subCharts.forEach(function(sc) { if (sc.chart) sc.chart.remove(); if (sc.container) sc.container.remove(); });
      p.subCharts = [];
      if (p.volumeSeries) { try { p.chart.removeSeries(p.volumeSeries); } catch(_) {} p.volumeSeries = null; }
      // Clear markers to prevent accumulation on each reapply
      if (p.candleSeries) { try { p.candleSeries.setMarkers([]); } catch(_) {} }

      // Shared marker array — all indicators push here, set once at end
      var _allChartMarkers = [];

      var prefs = loadIndicatorPrefs();
      var allFormulas = [];

      // Built-in indicators
      Object.keys(INDICATOR_MAP).forEach(function(key) {
        if (!prefs[key]) return;
        var def = INDICATOR_MAP[key];
        var parsed = FormulaParser.parse(def.formula);
        if (parsed) {
          parsed._builtinKey = key;
          allFormulas.push(parsed);
        }
      });

      // Custom scripts
      var customs = loadCustomScripts();
      customs.forEach(function(s) {
        var parsed = FormulaParser.parse(s.formula || s.name);
        if (parsed) allFormulas.push(parsed);
      });

      var panelBody = document.getElementById('chart-main-' + idx).parentElement;

      allFormulas.forEach(function(parsed) {
        var result = FormulaParser.execute(parsed, p.candles);
        if (!result) return;

        var times = p.candles.map(function(c) { return c.time; });

        if (result.type === 'volume') {
          var volSeries = p.chart.addHistogramSeries({
            priceScaleId: 'vol', priceFormat: { type: 'volume' },
            color: 'rgba(212,175,55,0.3)',
          });
          p.chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
          volSeries.setData(p.candles.map(function(c) {
            return { time: c.time, value: c.volume, color: c.close >= c.open ? 'rgba(52,211,153,0.3)' : 'rgba(244,63,94,0.3)' };
          }));
          p.volumeSeries = volSeries;
          return;
        }

        if (result.type === 'vsahistogram') {
          var vhd = result.vsaHistData;

          // Colored histogram bars in their own sub-pane
          var vsaHistSeries = p.chart.addHistogramSeries({
            priceScaleId: 'vsa-hist',
            priceFormat: { type: 'volume' },
            lastValueVisible: false,
            priceLineVisible: false,
          });
          p.chart.priceScale('vsa-hist').applyOptions({
            scaleMargins: { top: 0.7, bottom: 0 },
            visible: false,
          });
          vsaHistSeries.setData(vhd.bars);
          p.overlaySeries.push(vsaHistSeries);

          // Volume MA line (gray) overlaid on same pane
          var vmaSeries = p.chart.addLineSeries({
            color: '#94a3b8',
            lineWidth: 1,
            priceScaleId: 'vsa-hist',
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: false,
          });
          var vmaData = [];
          for (var vi = 0; vi < vhd.candles.length && vi < vhd.vma.length; vi++) {
            if (vhd.vma[vi] !== null) vmaData.push({ time: vhd.candles[vi].time, value: vhd.vma[vi] });
          }
          vmaSeries.setData(vmaData);
          p.overlaySeries.push(vmaSeries);
          return;
        }

        if (result.type === 'overlay') {
          if (result.multi) {
            result.multi.forEach(function(line) {
              var series = p.chart.addLineSeries({ color: line.color, lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
              var data = [];
              for (var i = 0; i < times.length && i < line.data.length; i++) {
                if (line.data[i] !== null) data.push({ time: times[i], value: line.data[i] });
              }
              series.setData(data);
              p.overlaySeries.push(series);
            });
          } else if (result.trendStructureData) {
            // Trend Structure: trend lines + markers + background
            var tsd = result.trendStructureData;

            // Draw trend lines as line series segments
            tsd.trendLines.forEach(function(tl) {
              var lineSeries = p.chart.addLineSeries({
                color: tl.color, lineWidth: 2, lineStyle: 2,
                priceLineVisible: false, lastValueVisible: false,
                crosshairMarkerVisible: false,
              });
              lineSeries.setData([
                { time: tl.t1, value: tl.p1 },
                { time: tl.t2, value: tl.p2 },
              ]);
              p.overlaySeries.push(lineSeries);
            });

            // Collect markers (set once at end of applyIndicators)
            if (tsd.markers.length) {
              tsd.markers.forEach(function(m) { _allChartMarkers.push(m); });
            }

          } else if (result.dtfxData) {
            // DTFX Algo Zones: zone boxes + fib lines + HH/HL/LH/LL markers
            var dzd = result.dtfxData;

            // Draw zone boxes — lines only, no area fill
            dzd.zones.forEach(function(zone) {
              var isBull = zone.type === 'bull';
              var lineColor = isBull ? 'rgba(52,211,153,0.4)' : 'rgba(244,63,94,0.4)';

              // Top boundary line
              var topLine = p.chart.addLineSeries({
                color: lineColor, lineWidth: 1, lineStyle: 2,
                priceLineVisible: false, lastValueVisible: false,
                crosshairMarkerVisible: false,
              });

              var zoneData = [];
              for (var ci = 0; ci < p.candles.length; ci++) {
                var t = p.candles[ci].time;
                if (t >= zone.startTime && t <= zone.endTime) {
                  zoneData.push({ time: t, value: zone.top });
                }
              }
              if (zoneData.length > 0) {
                var lastCandle = p.candles[p.candles.length - 1];
                if (lastCandle.time > zone.endTime) {
                  zoneData.push({ time: lastCandle.time, value: zone.top });
                }
              }

              topLine.setData(zoneData);
              p.overlaySeries.push(topLine);

              // Bottom boundary line
              var botLine = p.chart.addLineSeries({
                color: lineColor, lineWidth: 1, lineStyle: 2,
                priceLineVisible: false, lastValueVisible: false,
                crosshairMarkerVisible: false,
              });
              var botData = [];
              for (var ci = 0; ci < p.candles.length; ci++) {
                var t = p.candles[ci].time;
                if (t >= zone.startTime) {
                  botData.push({ time: t, value: zone.bottom });
                }
              }
              if (botData.length > 0) {
                var lastCandle = p.candles[p.candles.length - 1];
                if (lastCandle.time > zone.endTime && botData[botData.length - 1].time !== lastCandle.time) {
                  botData.push({ time: lastCandle.time, value: zone.bottom });
                }
              }
              botLine.setData(botData);
              p.overlaySeries.push(botLine);

              // Fib level lines inside the zone
              var fibColors = ['rgba(251,191,36,0.4)', 'rgba(167,139,250,0.5)', 'rgba(251,191,36,0.4)'];
              zone.fibs.forEach(function(fv, fi) {
                var fibLine = p.chart.addLineSeries({
                  color: fibColors[fi] || 'rgba(167,139,250,0.3)', lineWidth: 1, lineStyle: 3,
                  priceLineVisible: false, lastValueVisible: false,
                  crosshairMarkerVisible: false,
                });
                var fibData = [];
                for (var ci = 0; ci < p.candles.length; ci++) {
                  var t = p.candles[ci].time;
                  if (t >= zone.startTime) {
                    fibData.push({ time: t, value: fv });
                  }
                }
                if (fibData.length > 0) {
                  var lastCandle = p.candles[p.candles.length - 1];
                  if (lastCandle.time > zone.endTime && fibData[fibData.length - 1].time !== lastCandle.time) {
                    fibData.push({ time: lastCandle.time, value: fv });
                  }
                }
                fibLine.setData(fibData);
                p.overlaySeries.push(fibLine);
              });
            });

            // Collect markers (set once at end of applyIndicators)
            if (dzd.markers.length) {
              dzd.markers.forEach(function(m) { _allChartMarkers.push(m); });
            }

          } else if (result.vsaData) {
            // Volume Spread Analysis: boxes for volume events + VMA overlay
            var vsa = result.vsaData;

            // Draw effect boxes
            vsa.boxes.forEach(function(box) {
              var bullColor = 'rgba(0,255,187,';
              var bearColor = 'rgba(255,17,0,';
              var baseColor = box.isBull ? bullColor : bearColor;

              // Top line of box
              var topLine = p.chart.addLineSeries({
                color: baseColor + '0.5)', lineWidth: 1, lineStyle: 0,
                priceLineVisible: false, lastValueVisible: false,
                crosshairMarkerVisible: false,
              });
              // Bottom line of box
              var botLine = p.chart.addLineSeries({
                color: baseColor + '0.5)', lineWidth: 1, lineStyle: 0,
                priceLineVisible: false, lastValueVisible: false,
                crosshairMarkerVisible: false,
              });

              var topData = [], botData = [];
              for (var ci = 0; ci < p.candles.length; ci++) {
                var t = p.candles[ci].time;
                if (t >= box.startTime && t <= box.endTime) {
                  topData.push({ time: t, value: box.high });
                  botData.push({ time: t, value: box.low });
                }
              }

              topLine.setData(topData);
              botLine.setData(botData);
              p.overlaySeries.push(topLine);
              p.overlaySeries.push(botLine);

              // Signal marker at box end
              if (box.signal !== 'neutral') {
                var sigColor = box.signal === 'divergence' ? '#ff1100' : '#00ffbb';
                var sigText = box.signal === 'divergence' ? 'DIV' : 'CON';
                _allChartMarkers.push({
                  time: box.endTime,
                  position: box.isBull ? 'belowBar' : 'aboveBar',
                  color: sigColor, shape: 'square', text: sigText,
                });
              }
            });

            // Draw Volume MA as overlay line
            if (vsa.vma) {
              var vmaLine = p.chart.addLineSeries({
                color: '#1848cc', lineWidth: 1,
                priceLineVisible: false, lastValueVisible: false,
                priceScaleId: 'vol-vsa',
              });
              p.chart.priceScale('vol-vsa').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 }, visible: false });
              var vmaLineData = [];
              for (var ci = 0; ci < p.candles.length && ci < vsa.vma.length; ci++) {
                if (vsa.vma[ci] !== null) {
                  vmaLineData.push({ time: p.candles[ci].time, value: vsa.vma[ci] });
                }
              }
              vmaLine.setData(vmaLineData);
              p.overlaySeries.push(vmaLine);
            }

          } else if (result.smcProData) {
            // SMC Pro: full Zeiierman-style SMC visualization
            var smc = result.smcProData;
            var lastTime = p.candles[p.candles.length - 1].time;
            var firstTime = p.candles[0].time;

            // 1. Background shading removed — clean black chart

            // 2. Swing connector lines (dashed, recent only)
            smc.swingLines.forEach(function(sl) {
              var line = p.chart.addLineSeries({
                color: sl.color, lineWidth: 1, lineStyle: 2,
                priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
              });
              line.setData([{ time: sl.t1, value: sl.p1 }, { time: sl.t2, value: sl.p2 }]);
              p.overlaySeries.push(line);
            });

            // 3. BOS/BMS/CHoCH — markers + horizontal dashed lines (last 6 only)
            var allMarkers = _allChartMarkers; // use shared array
            var recentBreaks = smc.structureBreaks.slice(-6);
            recentBreaks.forEach(function(sb) {
              var isBull = sb.dir === 'bull';
              var color = isBull ? '#34d399' : '#f43f5e';
              // Marker label
              allMarkers.push({
                time: sb.time,
                position: isBull ? 'belowBar' : 'aboveBar',
                color: color, shape: 'square', text: sb.type,
              });
              // Horizontal dashed line extending from break point to right
              var breakLine = p.chart.addLineSeries({
                color: color, lineWidth: 1, lineStyle: 2,
                priceLineVisible: true, lastValueVisible: true, crosshairMarkerVisible: false,
              });
              // Extend line ~20 candles to the right from break point
              var sbIdx = -1;
              for (var ci = 0; ci < p.candles.length; ci++) { if (p.candles[ci].time === sb.time) { sbIdx = ci; break; } }
              if (sbIdx >= 0) {
                var endIdx = Math.min(p.candles.length - 1, sbIdx + 20);
                breakLine.setData([{ time: sb.time, value: sb.price }, { time: p.candles[endIdx].time, value: sb.price }]);
                p.overlaySeries.push(breakLine);
              }
            });

            // 4. HH/HL/LH/LL swing labels
            smc.markers.forEach(function(m) { allMarkers.push(m); });

            // 5–10 removed: Weak High, PDH/PDL, PWH/PWL, Mid Range, EQL/EQH, Order Blocks
            // Chart now matches TradingView SMC Expo: pivot labels + BMS/CHoCH only

            // 11. Stats box (HTML overlay)
            var statsId = 'smc-stats-' + idx;
            var existingStats = document.getElementById(statsId);
            if (existingStats) existingStats.remove();
            var statsBox = document.createElement('div');
            statsBox.id = statsId;
            var trendLabel = smc.currentTrend === 'up' ? 'Positive' : smc.currentTrend === 'down' ? 'Negative' : 'Neutral';
            var trendColor = smc.currentTrend === 'up' ? '#34d399' : smc.currentTrend === 'down' ? '#f43f5e' : '#9a8e80';
            var dp = smc.upperRange >= 100 ? 2 : smc.upperRange >= 1 ? 4 : 6;
            statsBox.innerHTML = '<div style="display:flex;gap:8px;align-items:center;margin-bottom:2px;"><span style="color:#9a8e80;">Trend:</span><span style="color:' + trendColor + ';font-weight:600;">' + trendLabel + '</span></div>'
              + '<div><span style="color:#9a8e80;">Upper Range:</span> <span style="color:#eee;">' + smc.upperRange.toFixed(dp) + '</span></div>'
              + '<div><span style="color:#9a8e80;">Lower Range:</span> <span style="color:#eee;">' + smc.lowerRange.toFixed(dp) + '</span></div>'
              + '<div><span style="color:#9a8e80;">Mid:</span> <span style="color:#fbbf24;">' + smc.midRange.toFixed(dp) + '</span></div>';
            statsBox.style.cssText = 'position:absolute;top:8px;right:8px;z-index:10;background:rgba(0,0,0,0.9);border:1px solid #2a2438;border-radius:6px;padding:6px 10px;font-size:10px;line-height:1.5;pointer-events:none;font-family:JetBrains Mono,monospace;';
            var chartContainer = document.getElementById('chart-main-' + idx);
            if (chartContainer) chartContainer.appendChild(statsBox);

          } else if (result.coloredData) {
            // Supertrend: colored line
            var series = p.chart.addLineSeries({ lineWidth: 2, priceLineVisible: false, lastValueVisible: false, color: '#34d399' });
            var data = [];
            for (var i = 0; i < times.length && i < result.coloredData.value.length; i++) {
              if (result.coloredData.value[i] !== null) {
                data.push({ time: times[i], value: result.coloredData.value[i], color: result.coloredData.direction[i] === 1 ? '#34d399' : '#f43f5e' });
              }
            }
            series.setData(data);
            p.overlaySeries.push(series);
          } else if (result.lineType === 'dots') {
            // PSAR dots
            var series = p.chart.addLineSeries({
              color: result.color || '#fbbf24', lineWidth: 0, priceLineVisible: false, lastValueVisible: false,
              pointMarkersVisible: true, pointMarkersRadius: 2,
            });
            var data = [];
            for (var i = 0; i < times.length && i < result.data.length; i++) {
              if (result.data[i] !== null) data.push({ time: times[i], value: result.data[i] });
            }
            series.setData(data);
            p.overlaySeries.push(series);
          } else {
            var color = result.color;
            if (parsed._builtinKey && INDICATOR_COLORS[parsed._builtinKey]) color = INDICATOR_COLORS[parsed._builtinKey];
            var series = p.chart.addLineSeries({ color: color || '#60a5fa', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var data = [];
            for (var i = 0; i < times.length && i < result.data.length; i++) {
              if (result.data[i] !== null) data.push({ time: times[i], value: result.data[i] });
            }
            series.setData(data);
            p.overlaySeries.push(series);
          }
        } else if (result.type === 'oscillator') {
          // Skip if user previously closed this oscillator
          if (getClosedOscillators().indexOf(result.label) >= 0) return;
          // Create sub-chart — restore saved height or default 80
          var savedSizes = getOscillatorSizes();
          var subH = savedSizes[result.label] || 80;
          var subDiv = document.createElement('div');
          subDiv.className = 'sub-chart-container';
          subDiv.style.position = 'relative';
          subDiv.style.height = subH + 'px';
          panelBody.appendChild(subDiv);

          var labelEl = document.createElement('div');
          labelEl.className = 'sub-chart-label';
          labelEl.textContent = result.label;
          subDiv.appendChild(labelEl);

          // Close and resize controls
          var controlsEl = document.createElement('div');
          controlsEl.className = 'sub-chart-controls';
          var closeBtn = document.createElement('button');
          closeBtn.className = 'sub-chart-btn close-btn';
          closeBtn.title = 'Close ' + result.label;
          closeBtn.textContent = '\u00D7';
          controlsEl.appendChild(closeBtn);
          subDiv.appendChild(controlsEl);

          var resizeHandle = document.createElement('div');
          resizeHandle.className = 'sub-chart-resize-handle';
          subDiv.appendChild(resizeHandle);

          var subChart = LightweightCharts.createChart(subDiv, Object.assign({}, CHART_THEME, {
            width: subDiv.clientWidth || panelBody.clientWidth,
            height: subH,
          }));

          // Close handler — persist so it stays closed on reapply
          (function(sd, sc, lbl) {
            closeBtn.addEventListener('click', function() {
              closeOscillator(lbl);
              sc.remove();
              sd.remove();
              // Show reopen bar if not already visible
              updateReopenBar(idx);
            });
          })(subDiv, subChart, result.label);

          // Drag-to-resize handler — saves height to localStorage on release
          (function(sd, sc, lbl) {
            var startY, startH;
            function onMouseMove(e) {
              var newH = Math.max(40, startH + (e.clientY - startY));
              sd.style.height = newH + 'px';
              sc.applyOptions({ height: newH });
            }
            function onMouseUp() {
              document.removeEventListener('mousemove', onMouseMove);
              document.removeEventListener('mouseup', onMouseUp);
              document.body.style.userSelect = '';
              document.body.style.cursor = '';
              saveOscillatorSize(lbl, sd.offsetHeight);
            }
            resizeHandle.addEventListener('mousedown', function(e) {
              e.preventDefault();
              startY = e.clientY;
              startH = sd.offsetHeight;
              document.body.style.userSelect = 'none';
              document.body.style.cursor = 'ns-resize';
              document.addEventListener('mousemove', onMouseMove);
              document.addEventListener('mouseup', onMouseUp);
            });
          })(subDiv, subChart, result.label);
          subChart.priceScale('right').applyOptions({ scaleMargins: { top: 0.1, bottom: 0.1 } });
          subChart.timeScale().applyOptions({ visible: false });

          // Sync time scale
          p.chart.timeScale().subscribeVisibleLogicalRangeChange(function(range) {
            if (range) subChart.timeScale().setVisibleLogicalRange(range);
          });

          if (result.macdData) {
            var macdSeries = subChart.addLineSeries({ color: result.colors.macd, lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var sigSeries = subChart.addLineSeries({ color: result.colors.signal, lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var histSeries = subChart.addHistogramSeries({ priceLineVisible: false, lastValueVisible: false });
            var mData = [], sData = [], hData = [];
            for (var i = 0; i < times.length; i++) {
              if (result.macdData.macd[i] !== null) mData.push({ time: times[i], value: result.macdData.macd[i] });
              if (result.macdData.signal[i] !== null) sData.push({ time: times[i], value: result.macdData.signal[i] });
              if (result.macdData.histogram[i] !== null) hData.push({ time: times[i], value: result.macdData.histogram[i], color: result.macdData.histogram[i] >= 0 ? 'rgba(52,211,153,0.5)' : 'rgba(244,63,94,0.5)' });
            }
            macdSeries.setData(mData);
            sigSeries.setData(sData);
            histSeries.setData(hData);
          } else if (result.stochData) {
            var kSeries = subChart.addLineSeries({ color: '#60a5fa', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var dSeries = subChart.addLineSeries({ color: '#f43f5e', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var kData = [], dData = [];
            for (var i = 0; i < times.length; i++) {
              if (result.stochData.k[i] !== null) kData.push({ time: times[i], value: result.stochData.k[i] });
            }
            var dIdx = 0;
            for (var i = 0; i < times.length; i++) {
              if (result.stochData.k[i] !== null && dIdx < result.stochData.d.length) {
                if (result.stochData.d[dIdx] !== null) dData.push({ time: times[i], value: result.stochData.d[dIdx] });
                dIdx++;
              }
            }
            kSeries.setData(kData);
            dSeries.setData(dData);
            if (result.levels) {
              result.levels.forEach(function(lv) {
                kSeries.createPriceLine({ price: lv, color: 'rgba(107,114,128,0.4)', lineWidth: 1, lineStyle: 2 });
              });
            }
          } else {
            var lineSeries = subChart.addLineSeries({ color: result.color || '#a78bfa', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
            var lineData = [];
            for (var i = 0; i < times.length && i < result.data.length; i++) {
              if (result.data[i] !== null) lineData.push({ time: times[i], value: result.data[i] });
            }
            lineSeries.setData(lineData);
            if (result.levels) {
              result.levels.forEach(function(lv) {
                lineSeries.createPriceLine({ price: lv, color: 'rgba(107,114,128,0.4)', lineWidth: 1, lineStyle: 2 });
              });
            }
          }

          // Resize sub-chart
          var subRo = new ResizeObserver(function() {
            subChart.applyOptions({ width: subDiv.clientWidth });
          });
          subRo.observe(subDiv);

          p.subCharts.push({ chart: subChart, container: subDiv, resizeObserver: subRo });
        }
      });

      // Set ALL collected markers once at the end (prevents duplication)
      if (p.candleSeries && _allChartMarkers.length > 0) {
        _allChartMarkers.sort(function(a, b) { return a.time - b.time; });
        p.candleSeries.setMarkers(_allChartMarkers);
      }

      // Show reopen bar for any closed oscillators
      updateReopenBar(idx);
    }

    function updateReopenBar(idx) {
      var panelBody = document.getElementById('chart-main-' + idx).parentElement;
      var existing = panelBody.querySelector('.reopen-bar');
      if (existing) existing.remove();

      var closed = getClosedOscillators();
      if (!closed.length) return;

      var bar = document.createElement('div');
      bar.className = 'reopen-bar';
      bar.style.cssText = 'display:flex;gap:6px;padding:4px 8px;background:#1a1625;border-top:1px solid #2a2438;align-items:center;flex-wrap:wrap;';

      var label = document.createElement('span');
      label.style.cssText = 'color:#9a8e80;font-size:10px;margin-right:4px;';
      label.textContent = 'Closed:';
      bar.appendChild(label);

      closed.forEach(function(name) {
        var btn = document.createElement('button');
        btn.style.cssText = 'background:#2a2438;color:#d4af37;border:1px solid #3a3448;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit;';
        btn.textContent = name + ' \u21BB';
        btn.title = 'Reopen ' + name;
        btn.addEventListener('click', function() {
          reopenOscillator(name);
          applyIndicators(idx);
        });
        bar.appendChild(btn);
      });

      panelBody.appendChild(bar);
    }

    async function createAllCharts() {
      _chartCreating = true;
      // Create all panels in parallel for speed
      await Promise.all(Array.from({ length: CHART_COUNT }, function(_, i) { return createChart(i); }));
      _chartCreating = false;
    }

    function recreateAllCharts() {
      if (_chartCreating) return; // skip if already creating
      if (_recreateTimer) clearTimeout(_recreateTimer);
      _recreateTimer = setTimeout(async function() {
        if (_chartCreating) return;
        _chartCreating = true;
        await Promise.all(Array.from({ length: CHART_COUNT }, function(_, i) { return createChart(i); }));
        _chartCreating = false;
      }, 50);

    // SMC Data + UI Updates (unchanged)

    function formatPrice(price) {
      if (price >= 1000) return price.toFixed(2);
      if (price >= 1) return price.toFixed(4);
      if (price >= 0.001) return price.toFixed(6);
      return price.toFixed(8);
    }

    function updateRightSidebar(data) {
      if (!data) return;
      STATE.chartData = data;
      var trend = data.trend || 'Neutral';
      var trendEl = document.getElementById('trend-value');
      trendEl.textContent = trend;
      trendEl.className = 'trend-value ' + trend.toLowerCase();
    }

    function updateSummary(data) {
      if (!data) return;
      var highLabels = data.labels?.filter(function(l) { return l.type === 'high'; }) || [];
      var lowLabels = data.labels?.filter(function(l) { return l.type === 'low'; }) || [];
      var lastHigh = highLabels[highLabels.length - 1];
      var lastLow = lowLabels[lowLabels.length - 1];
      var structure = (lastHigh?.label || '--') + ' / ' + (lastLow?.label || '--');
      var isBullish = lastHigh?.label === 'HH' && lastLow?.label === 'HL';
      var isBearish = lastHigh?.label === 'LH' && lastLow?.label === 'LL';
      var trend = isBullish ? 'Bullish' : isBearish ? 'Bearish' : 'Neutral';
      var trendColor = isBullish ? 'var(--color-success)' : isBearish ? 'var(--color-danger)' : 'var(--color-fg-muted)';
      DOM.sumTrend.textContent = trend;
      DOM.sumTrend.style.color = trendColor;
      DOM.sumStructure.textContent = structure;
      var swingHighs = data.swings?.filter(function(s) { return s.type === 'high'; }) || [];
      var swingLows = data.swings?.filter(function(s) { return s.type === 'low'; }) || [];
      DOM.sumSh.textContent = swingHighs.length ? formatPrice(swingHighs[swingHighs.length - 1].price) : '--';
      DOM.sumSl.textContent = swingLows.length ? formatPrice(swingLows[swingLows.length - 1].price) : '--';
      var bullOB = data.orderBlocks?.filter(function(o) { return o.type === 'bullish'; }).length || 0;
      var bearOB = data.orderBlocks?.filter(function(o) { return o.type === 'bearish'; }).length || 0;
      DOM.sumOb.textContent = bullOB + ' Bull / ' + bearOB + ' Bear';
      var bullFVG = data.fvgs?.filter(function(f) { return f.type === 'bullish'; }).length || 0;
      var bearFVG = data.fvgs?.filter(function(f) { return f.type === 'bearish'; }).length || 0;
      DOM.sumFvg.textContent = bullFVG + ' Bull / ' + bearFVG + ' Bear';
      var kl = data.keyLevels || {};
      DOM.sumPdhl.textContent = kl.PDH && kl.PDL ? formatPrice(kl.PDH) + ' / ' + formatPrice(kl.PDL) : '--';
    }

    function renderCoinList(coins, filter) {
      filter = filter || '';
      var filtered = filter
        ? coins.filter(function(c) { return c.symbol.toLowerCase().includes(filter.toLowerCase()); })
        : coins;

      if (!filtered.length) { DOM.coinList.innerHTML = '<div class="coin-loading">No coins found</div>'; return; }

      DOM.coinList.innerHTML = filtered.map(function(coin) {
        var isActive = coin.symbol === STATE.symbol;
        var changeClass = coin.change24h >= 0 ? 'positive' : 'negative';
        var trendClass = coin.trend === 'bullish' ? 'bullish' : coin.trend === 'bearish' ? 'bearish' : 'neutral';
        var changeSign = coin.change24h >= 0 ? '+' : '';
        var exchange = coin.exchange || 'binance';
        var exchangeUrl = exchange === 'bitunix'
          ? 'https://www.bitunix.com/futures/USDT-M/' + coin.symbol
          : 'https://www.binance.com/en/futures/' + coin.symbol;
        var exchangeBadge = exchange === 'bitunix'
          ? '<span style="font-size:9px;color:var(--color-bitunix);margin-left:4px;">BTX</span>' : '';

        return '<div class="coin-item ' + (isActive ? 'active' : '') + '" role="option" aria-selected="' + isActive + '" data-symbol="' + coin.symbol + '" tabindex="0">'
          + '<div class="coin-info"><div class="coin-symbol">' + coin.symbol.replace('USDT', '') + exchangeBadge
          + ' <span class="coin-structure ' + trendClass + '">' + coin.structure + '</span></div></div>'
          + '<div class="coin-actions"><div>'
          + '<div class="coin-price">' + formatPrice(coin.price) + '</div>'
          + '<div class="coin-change ' + changeClass + '">' + changeSign + coin.change24h.toFixed(2) + '%</div>'
          + '</div><a class="coin-link" href="' + exchangeUrl + '" target="_blank" rel="noopener noreferrer" title="Open on ' + exchange + '" onclick="event.stopPropagation()">&#x2197;</a></div></div>';
      }).join('');

      DOM.coinList.querySelectorAll('.coin-item').forEach(function(el) {
        el.addEventListener('click', function() { handleCoinSelect(el.dataset.symbol); });
        el.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCoinSelect(el.dataset.symbol); }
        });
      });
    }

    function handleCoinSelect(symbol) {
      if (_chartCreating) return; // prevent double-click while loading
      document.getElementById('left-sidebar').classList.remove('mobile-open');
      document.getElementById('mobile-overlay').classList.remove('active');
      STATE.symbol = symbol;
      saveChartSettings();
      DOM.toolbarSymbol.textContent = symbol;
      DOM.coinList.querySelectorAll('.coin-item').forEach(function(el) {
        var isActive = el.dataset.symbol === symbol;
        el.classList.toggle('active', isActive);
        el.setAttribute('aria-selected', isActive);
      });
      var coin = STATE.coins.find(function(c) { return c.symbol === symbol; });
      if (coin) {
        DOM.toolbarPrice.textContent = formatPrice(coin.price);
        DOM.toolbarChange.textContent = (coin.change24h >= 0 ? '+' : '') + coin.change24h.toFixed(2) + '%';
        DOM.toolbarChange.className = 'toolbar-change ' + (coin.change24h >= 0 ? 'positive' : 'negative');
      }
      candleCache.clear();
      recreateAllCharts();
      connectWebSocket();
      // Load sidebar data after charts are done (non-blocking)
      setTimeout(loadSmcData, 500);
    }

    // ============================================================
    // WebSocket -- Live Price + Candle Updates
    // ============================================================

    function connectWebSocket() {
      if (STATE.ws) { STATE.ws.onclose = null; STATE.ws.close(); STATE.ws = null; }

      // Build combined stream for all active panel intervals
      var sym = STATE.symbol.toLowerCase();
      var streams = [];
      var seenIntervals = {};
      for (var i = 0; i < CHART_COUNT; i++) {
        var bi = TV_TO_BINANCE[chartIntervals[i]] || '1m';
        if (!seenIntervals[bi]) { streams.push(sym + '@kline_' + bi); seenIntervals[bi] = true; }
      }
      // Also include the STATE.interval for toolbar
      if (!seenIntervals[STATE.interval]) streams.push(sym + '@kline_' + STATE.interval);

      var wsUrl = 'wss://fstream.binance.com/stream?streams=' + streams.join('/');
      var ws = new WebSocket(wsUrl);
      STATE.ws = ws;

      ws.onopen = function() { console.log('[WS] Connected: ' + streams.join(', ')); };

      ws.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          var data = msg.data;
          if (!data || !data.k) return;

          var k = data.k;
          var closePrice = parseFloat(k.c);

          // Update toolbar price
          if (DOM.toolbarPrice) {
            var prevPrice = STATE.lastPrice;
            STATE.lastPrice = closePrice;
            DOM.toolbarPrice.textContent = '$' + formatPrice(closePrice);
            if (prevPrice !== null && closePrice !== prevPrice) {
              var tickClass = closePrice > prevPrice ? 'tick-up' : 'tick-down';
              DOM.toolbarPrice.classList.remove('tick-up', 'tick-down');
              DOM.toolbarPrice.classList.add(tickClass);
              setTimeout(function() { DOM.toolbarPrice.classList.remove(tickClass); }, 600);
            }
          }

          var coinEl = document.querySelector('.coin-item[data-symbol="' + STATE.symbol + '"] .coin-price');
          if (coinEl) coinEl.textContent = '$' + formatPrice(closePrice);

          // Update live candle on matching chart panels (shifted to local time)
          var candle = {
            time: Math.floor(parseInt(k.t) / 1000) + TZ_OFFSET_SEC,
            open: parseFloat(k.o),
            high: parseFloat(k.h),
            low: parseFloat(k.l),
            close: closePrice,
            volume: parseFloat(k.v),
          };

          var kInterval = k.i;
          var isClosed = k.x === true;
          for (var i = 0; i < CHART_COUNT; i++) {
            var panelInterval = TV_TO_BINANCE[chartIntervals[i]];
            if (panelInterval === kInterval && chartPanels[i].candleSeries) {
              var p = chartPanels[i];

              // Update or append candle in the data array
              if (p.candles.length > 0) {
                var lastCandle = p.candles[p.candles.length - 1];
                if (lastCandle.time === candle.time) {
                  // Update existing candle
                  lastCandle.open = candle.open;
                  lastCandle.high = candle.high;
                  lastCandle.low = candle.low;
                  lastCandle.close = candle.close;
                  lastCandle.volume = candle.volume;
                } else if (candle.time > lastCandle.time) {
                  // New candle
                  p.candles.push(candle);
                  // Keep array from growing unbounded
                  if (p.candles.length > 500) p.candles.shift();
                }
              }

              p.candleSeries.update(candle);

              // Update volume if active
              if (p.volumeSeries) {
                p.volumeSeries.update({
                  time: candle.time, value: candle.volume,
                  color: candle.close >= candle.open ? 'rgba(52,211,153,0.3)' : 'rgba(244,63,94,0.3)',
                });
              }

              // Reapply indicators when a candle closes (throttled: max once per 10s per panel)
              if (isClosed) {
                var now = Date.now();
                if (now - _lastIndicatorApply[i] > 10000) {
                  _lastIndicatorApply[i] = now;
                  applyIndicators(i);
                }
              }
            }
          }
        } catch (_) {}
      };

      ws.onclose = function() {
        console.log('[WS] Disconnected, reconnecting in 3s...');
        setTimeout(function() { if (STATE.symbol) connectWebSocket(); }, 3000);
      };
      ws.onerror = function(err) { console.error('[WS] Error:', err); ws.close(); };
    }

    var miniTickerWs = null;
    function connectMiniTickerStream() {
      if (miniTickerWs) { miniTickerWs.onclose = null; miniTickerWs.close(); }
      miniTickerWs = new WebSocket('wss://fstream.binance.com/ws/!miniTicker@arr');
      miniTickerWs.onmessage = function(event) {
        try {
          var tickers = JSON.parse(event.data);
          for (var i = 0; i < tickers.length; i++) {
            var t = tickers[i];
            var coinEl = document.querySelector('.coin-item[data-symbol="' + t.s + '"] .coin-price');
            if (coinEl) coinEl.textContent = '$' + formatPrice(parseFloat(t.c));
          }
        } catch (_) {}
      };
      miniTickerWs.onclose = function() { setTimeout(connectMiniTickerStream, 5000); };
      miniTickerWs.onerror = function() { miniTickerWs.close(); };
    }

    // ============================================================
    // Add Custom Script (global for inline onclick)
    // ============================================================

    function addCustomScript() {
      var scriptInput = document.getElementById('script-name-input');
      var indDropdown = document.getElementById('indicator-dropdown');
      var indBtn = document.getElementById('btn-indicators');
      var name = scriptInput.value.trim();
      if (!name) { showToast('Type a formula or indicator name', 'warning'); scriptInput.focus(); return; }
      if (name.length > 50) { showToast('Max 50 characters', 'warning'); return; }

      // Try parsing as formula first, then as preset name
      var parsed = FormulaParser.parse(name);
      if (!parsed) { showToast('Unknown formula. Try: ema(close, 50), rsi(close, 14), bb(close, 20, 2)', 'error'); return; }

      var formula = parsed.formula;
      var scripts = loadCustomScripts();
      if (scripts.some(function(s) { return s.formula === formula || s.name === name; })) {
        showToast('Already added', 'warning'); return;
      }

      scripts.push({ name: name, formula: formula });
      saveCustomScripts(scripts);
      scriptInput.value = '';
      renderCustomScripts();
      recreateAllCharts();
      indDropdown.classList.add('open');
      indBtn.classList.add('active');
      showToast('Added: ' + name, 'success');
    }

    // ============================================================
    // Event Handlers
    // ============================================================

    function setupEventListeners() {
      var overlay = document.getElementById('mobile-overlay');
      var leftSidebar = document.getElementById('left-sidebar');

      function closeMobilePanels() { leftSidebar.classList.remove('mobile-open'); overlay.classList.remove('active'); }

      document.getElementById('btn-coins').addEventListener('click', function() {
        var isOpen = leftSidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('active', isOpen);
      });
      overlay.addEventListener('click', closeMobilePanels);

      // Main toolbar TF buttons — only changes C1 (panel 0), other panels keep their own TF
      document.querySelectorAll('#tf-group .tf-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (_chartCreating) return; // prevent clicks while charts are loading
          document.querySelectorAll('#tf-group .tf-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          STATE.interval = btn.dataset.tf;

          // Only change panel 0 (C1) — preserve C2/C3 individual TF settings
          chartIntervals[0] = btn.dataset.tvInterval;
          var panel0 = document.querySelector('.chart-panel-tf[data-panel="0"]');
          if (panel0) {
            panel0.querySelectorAll('.panel-tf-btn').forEach(function(b) { b.classList.remove('active'); });
            var match = panel0.querySelector('.panel-tf-btn[data-tv="' + btn.dataset.tvInterval + '"]');
            if (match) match.classList.add('active');
          }

          candleCache.clear();
          saveChartSettings();
          createChart(0); // only recreate C1
          loadSmcData();
          connectWebSocket();
        });
      });

      // Per-panel TF buttons
      document.querySelectorAll('.chart-panel-tf').forEach(function(group) {
        var panelIdx = parseInt(group.dataset.panel);
        group.querySelectorAll('.panel-tf-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            if (_chartCreating) return;
            group.querySelectorAll('.panel-tf-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            chartIntervals[panelIdx] = btn.dataset.tv;
            candleCache.clear();
            saveChartSettings();
            createChart(panelIdx);
            connectWebSocket();
          });
        });
      });

      DOM.coinSearch.addEventListener('input', function(e) { renderCoinList(STATE.coins, e.target.value); });

      // Close/reopen panel controls
      function updatePanelLayout() {
        var chartArea = document.getElementById('chart-area');
        var c2closed = document.getElementById('chart-panel-1').classList.contains('collapsed');
        var c3closed = document.getElementById('chart-panel-2').classList.contains('collapsed');

        chartArea.classList.toggle('c2-closed', c2closed);
        chartArea.classList.toggle('c3-closed', c3closed);
        chartArea.classList.toggle('has-closed', c2closed || c3closed);

        // Show/hide reopen buttons
        document.querySelector('[data-reopen="1"]').style.display = c2closed ? '' : 'none';
        document.querySelector('[data-reopen="2"]').style.display = c3closed ? '' : 'none';

        // Resize C1 chart after layout change
        setTimeout(function() {
          var p0 = chartPanels[0];
          if (p0 && p0.chart) {
            var c = document.getElementById('chart-main-0');
            p0.chart.applyOptions({ width: c.clientWidth, height: c.clientHeight });
          }
        }, 50);
      }

      document.querySelectorAll('.chart-panel-close').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.dataset.closePanel);
          var panel = document.getElementById('chart-panel-' + idx);
          panel.classList.add('collapsed');
          updatePanelLayout();
        });
      });

      document.querySelectorAll('.chart-reopen-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.dataset.reopen);
          var panel = document.getElementById('chart-panel-' + idx);
          panel.classList.remove('collapsed');
          updatePanelLayout();
          // Recreate chart since panel was hidden
          createChart(idx);
        });
      });

      // Zoom controls
      document.querySelectorAll('.chart-zoom-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.dataset.panel);
          var p = chartPanels[idx];
          if (!p || !p.chart) return;
          var ts = p.chart.timeScale();
          var action = btn.dataset.zoom;

          if (action === 'fit') {
            ts.fitContent();
            return;
          }

          var range = ts.getVisibleLogicalRange();
          if (!range) return;
          var barsCount = range.to - range.from;
          var center = (range.from + range.to) / 2;
          var factor = action === 'in' ? 0.6 : 1.5;
          var newBars = Math.max(10, barsCount * factor);
          ts.setVisibleLogicalRange({
            from: center - newBars / 2,
            to: center + newBars / 2,
          });
        });
      });

      // Layout toggle (1 or 3 screens)
      document.querySelectorAll('.layout-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var layout = btn.dataset.layout;
          var chartArea = document.getElementById('chart-area');
          document.querySelectorAll('.layout-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');

          if (layout === '1') {
            chartArea.classList.add('layout-1');
            chartArea.classList.remove('layout-3');
            CHART_COUNT = 1;
          } else {
            chartArea.classList.remove('layout-1');
            chartArea.classList.add('layout-3');
            CHART_COUNT = 3;
          }

          saveChartSettings();
          recreateAllCharts();
        });
      });

      DOM.bottomPanelToggle.addEventListener('click', function() {
        var isCollapsed = DOM.bottomPanel.classList.toggle('collapsed');
        DOM.bottomPanelToggle.textContent = isCollapsed ? '\u25B2' : '\u25BC';
        DOM.bottomPanelToggle.setAttribute('aria-expanded', !isCollapsed);
      });

      // Indicator Dropdown
      var indBtn = document.getElementById('btn-indicators');
      var indDropdown = document.getElementById('indicator-dropdown');
      var prefs = loadIndicatorPrefs();
      syncIndicatorUI(prefs);
      renderCustomScripts();

      indBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = indDropdown.classList.toggle('open');
        indBtn.classList.toggle('active', isOpen);
      });

      document.addEventListener('click', function(e) {
        if (!indDropdown.contains(e.target) && e.target !== indBtn) {
          indDropdown.classList.remove('open'); indBtn.classList.remove('active');
        }
      });

      indDropdown.addEventListener('click', function(e) { e.stopPropagation(); });

      indDropdown.querySelectorAll('input[data-ind]').forEach(function(cb) {
        cb.addEventListener('change', function() {
          var prefs = loadIndicatorPrefs();
          prefs[cb.dataset.ind] = cb.checked;
          saveIndicatorPrefs(prefs);
          recreateAllCharts();
        });
      });

      document.getElementById('ind-all-on').addEventListener('click', function() {
        var prefs = loadIndicatorPrefs();
        Object.keys(INDICATOR_MAP).forEach(function(key) { prefs[key] = true; });
        saveIndicatorPrefs(prefs); syncIndicatorUI(prefs); recreateAllCharts();
      });

      document.getElementById('ind-all-off').addEventListener('click', function() {
        var prefs = loadIndicatorPrefs();
        Object.keys(INDICATOR_MAP).forEach(function(key) { prefs[key] = false; });
        saveIndicatorPrefs(prefs); syncIndicatorUI(prefs); recreateAllCharts();
      });

      document.getElementById('script-name-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); addCustomScript(); }
      });
    }

    // ============================================================
    // Init
    // ============================================================

    async function init() {
      // Restore saved settings to UI
      DOM.toolbarSymbol.textContent = STATE.symbol;

      // Restore main toolbar TF active button
      var mainTfBtns = document.querySelectorAll('#tf-group .tf-btn');
      mainTfBtns.forEach(function(b) { b.classList.remove('active'); });
      var savedTf = STATE.interval || '15m';
      var matchedTf = document.querySelector('#tf-group .tf-btn[data-tf="' + savedTf + '"]');
      if (matchedTf) matchedTf.classList.add('active');

      // Restore per-panel TF active buttons
      for (var i = 0; i < 3; i++) {
        var tfGroup = document.querySelector('.chart-panel-tf[data-panel="' + i + '"]');
        if (tfGroup && chartIntervals[i]) {
          tfGroup.querySelectorAll('.panel-tf-btn').forEach(function(b) { b.classList.remove('active'); });
          var match = tfGroup.querySelector('.panel-tf-btn[data-tv="' + chartIntervals[i] + '"]');
          if (match) match.classList.add('active');
        }
      }

      // Restore layout button active state
      document.querySelectorAll('.layout-btn').forEach(function(b) { b.classList.remove('active'); });
      var layoutMatch = document.querySelector('.layout-btn[data-layout="' + CHART_COUNT + '"]');
      if (layoutMatch) layoutMatch.classList.add('active');
      if (CHART_COUNT === 1) {
        document.getElementById('chart-area').classList.add('layout-1');
      }

      // Restore indicator toggle checkboxes from saved prefs
      var prefs = loadIndicatorPrefs();
      document.querySelectorAll('.ind-toggle input[data-ind]').forEach(function(cb) {
        cb.checked = !!prefs[cb.dataset.ind];
      });

      setupEventListeners();
      createAllCharts();

      await Promise.all([loadCoinList(), loadSmcData()]);

      startAutoRefresh();
      connectWebSocket();
      connectMiniTickerStream();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
